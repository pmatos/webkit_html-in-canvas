<!DOCTYPE html><!-- webkit-test-runner [ CanvasDrawElementEnabled=true ] -->
<title>drawElementImage(child, sx, sy, sw, sh, dx, dy, dwidth, dheight) — source crop + destination scale</title>
<style>
  body { margin: 0; }
  canvas { width: 200px; height: 200px; background: white; }
  #child {
    width: 100px;
    height: 100px;
    background: linear-gradient(to right, red 0 50%, green 50% 100%);
  }
</style>
<canvas id="c" width="200" height="200" layoutsubtree>
  <div id="child"></div>
</canvas>
<script>
function nextPaint() {
    return new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
}
async function run() {
    if (window.testRunner) testRunner.waitUntilDone();
    await nextPaint();
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const child = document.getElementById("child");
    // Source rect crops to the green right-half (sx=50, sy=0, sw=50, sh=100) and stretches
    // it to the full 100x200 destination at (0, 0).
    ctx.drawElementImage(child, 50, 0, 50, 100, 0, 0, 100, 200);
    // Source rect crops to the red left-half (sx=0, sy=0, sw=50, sh=100) drawn at 1:1 to (100, 0).
    ctx.drawElementImage(child, 0, 0, 50, 100, 100, 0, 50, 100);
    if (window.testRunner) testRunner.notifyDone();
}
run();
</script>
