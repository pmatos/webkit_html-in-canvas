<!DOCTYPE html>
<title>Reference: green 50x100 at (80,50) and red 50x50 at (10,200) on a 300x300 white canvas</title>
<style>
  body { margin: 0; }
  canvas { width: 300px; height: 300px; background: white; }
</style>
<canvas id="c" width="300" height="300"></canvas>
<script>
const ctx = document.getElementById("c").getContext("2d");
ctx.fillStyle = "green";
ctx.fillRect(80, 50, 50, 100);
ctx.fillStyle = "red";
ctx.fillRect(10, 200, 50, 50);
</script>
