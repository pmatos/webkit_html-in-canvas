<!DOCTYPE html><!-- webkit-test-runner [ CanvasDrawElementEnabled=true ] -->
<title>drawElementImage 4-arg — destination geometry is canvas-grid (backing-store) pixels</title>
<style>
  body { margin: 0; }
  canvas { width: 200px; height: 200px; background: white; }
  #child { width: 50px; height: 50px; background: red; }
</style>
<canvas id="c" width="400" height="400" layoutsubtree>
  <div id="child"></div>
</canvas>
<script>
function nextPaint() {
    return new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
}
async function run() {
    if (window.testRunner) testRunner.waitUntilDone();
    await nextPaint();
    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");
    const child = document.getElementById("child");
    // dx/dy/dwidth/dheight are canvas-grid (backing-store) pixels. With backing 400x400
    // and CSS 200x200 (2x downsample), this 200x200 grid rect at (100, 100) renders as
    // a 100x100 CSS rect at (50, 50).
    ctx.drawElementImage(child, 100, 100, 200, 200);
    if (window.testRunner) testRunner.notifyDone();
}
run();
</script>
