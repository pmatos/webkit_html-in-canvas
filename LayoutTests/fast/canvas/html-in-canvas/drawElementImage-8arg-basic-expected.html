<!DOCTYPE html>
<title>Reference: green 100x200 at (0,0) and red 50x100 at (100,0) on a 200x200 white canvas</title>
<style>
  body { margin: 0; }
  canvas { width: 200px; height: 200px; background: white; }
</style>
<canvas id="c" width="200" height="200"></canvas>
<script>
const ctx = document.getElementById("c").getContext("2d");
ctx.fillStyle = "green";
ctx.fillRect(0, 0, 100, 200);
ctx.fillStyle = "red";
ctx.fillRect(100, 0, 50, 100);
</script>
