<!DOCTYPE html><!-- webkit-test-runner [ CanvasDrawElementEnabled=true WebGPUEnabled=true ] -->
<title>WebGPU GPUQueue.copyElementImageToTexture — 8-arg crop+scale + zero-area no-op (TB9)</title>
<script src="../../../resources/testharness.js"></script>
<script src="../../../resources/testharnessreport.js"></script>
<style>
  body { margin: 0; }
  #cvs { display: block; }
  /* 32×32 split horizontally: left red, right green. */
  #child {
    width: 32px;
    height: 32px;
    background: linear-gradient(to right, rgb(255, 0, 0) 0 50%, rgb(0, 255, 0) 50% 100%);
  }
</style>
<body>
<canvas id="cvs" width="32" height="32" layoutsubtree>
    <div id="child"></div>
</canvas>
<script>
function nextPaint() {
    return new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
}

async function readbackTexture(device, texture, width, height) {
    const bytesPerRow = Math.ceil((width * 4) / 256) * 256;
    const readback = device.createBuffer({
        size: bytesPerRow * height,
        usage: GPUBufferUsage.COPY_DST | GPUBufferUsage.MAP_READ,
    });
    const encoder = device.createCommandEncoder();
    encoder.copyTextureToBuffer(
        { texture },
        { buffer: readback, bytesPerRow, rowsPerImage: height },
        { width, height, depthOrArrayLayers: 1 });
    device.queue.submit([encoder.finish()]);
    await readback.mapAsync(GPUMapMode.READ);
    const mapped = new Uint8Array(readback.getMappedRange().slice(0));
    readback.unmap();
    const out = new Uint8Array(width * height * 4);
    for (let y = 0; y < height; ++y)
        out.set(mapped.subarray(y * bytesPerRow, y * bytesPerRow + width * 4), y * width * 4);
    return out;
}

promise_test(async () => {
    await nextPaint();
    const child = document.getElementById("child");
    const adapter = await navigator.gpu.requestAdapter();
    const device = await adapter.requestDevice();

    const texture = device.createTexture({
        size: { width: 32, height: 32 },
        format: "rgba8unorm",
        usage: GPUTextureUsage.RENDER_ATTACHMENT | GPUTextureUsage.COPY_DST | GPUTextureUsage.COPY_SRC,
    });
    // 8-arg overload: crop right half (16,0,16,16) then scale to 32×32 destination.
    device.queue.copyElementImageToTexture(child,
        /*sx*/ 16, /*sy*/ 0, /*swidth*/ 16, /*sheight*/ 16,
        /*width*/ 32, /*height*/ 32,
        { texture });

    // Zero-area no-op: width=100, height=0 must not crash and must not overwrite
    // the texture we just uploaded. Same semantics as the WebGL 12-arg zero-area
    // pin (tex-element-image-2d-basic.html:83-84).
    device.queue.copyElementImageToTexture(child,
        /*width*/ 100, /*height*/ 0,
        { texture });

    const pixels = await readbackTexture(device, texture, 32, 32);

    // Whole 32×32 should be green (right-half crop upscaled to 32×32).
    const a = (8 * 32 + 8) * 4;
    const b = (24 * 32 + 24) * 4;
    for (const [label, i] of [["top-left interior", a], ["bottom-right interior", b]]) {
        assert_equals(pixels[i], 0, `${label}: red`);
        assert_equals(pixels[i + 1], 255, `${label}: green`);
        assert_equals(pixels[i + 2], 0, `${label}: blue`);
        assert_equals(pixels[i + 3], 255, `${label}: alpha`);
    }
}, "8-arg copyElementImageToTexture crops then scales; zero-area follow-up call is a no-op");
</script>
</body>
